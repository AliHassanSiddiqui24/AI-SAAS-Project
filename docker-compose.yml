version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aicrmpro-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=aicrmpro
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=localdev123
      - POSTGRES_HOST_AUTH_METHOD=trust
    ports:
      - "5433:5432"
    
    networks:
      - aicrmpro-network

  redis:
    image: redis:7-alpine
    container_name: aicrmpro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aicrmpro-network

  adminer:
    image: adminer:latest
    container_name: aicrmpro-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    depends_on:
      - postgres
    networks:
      - aicrmpro-network

volumes:
  postgres_data:
  redis_data:

networks:
  aicrmpro-network:
    driver: bridge